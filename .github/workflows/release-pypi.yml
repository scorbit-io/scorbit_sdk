name: Release PyPI

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build Python wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read VERSION
        run: echo "VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"

      - name: Verify tag matches VERSION file
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ "${{ env.VERSION }}" != "${GITHUB_REF_NAME}" ]; then
            echo "VERSION file (${{ env.VERSION }}) does not match git tag (${GITHUB_REF_NAME})"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Python 3 wheel
        run: make python

      - name: Build Python 2.7 wheel
        run: make python27

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-wheels
          path: build/dist/${{ env.VERSION }}/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
