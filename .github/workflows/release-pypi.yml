name: Release PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag to publish to PyPI
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Verify release tag input
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is required"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Read VERSION
        run: echo "VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"

      - name: Verify release tag matches VERSION file
        run: |
          if [ "$VERSION" != "$RELEASE_TAG" ]; then
            echo "VERSION file (${VERSION}) does not match release tag (${RELEASE_TAG})"
            exit 1
          fi

      - name: Download release wheels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.whl" \
            --dir dist

          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "No wheel assets found on release ${RELEASE_TAG}"
            exit 1
          fi

          ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
